StylesPath = .vale/styles
MinAlertLevel = error
Packages = https://github.com/errata-ai/write-good/releases/latest/download/write-good.zip, https://github.com/errata-ai/proselint/releases/latest/download/proselint.zip

[formats]
mdx = md

[*.md]
BasedOnStyles = write-good, proselint
proselint.Typography = NO
TokenIgnores = (`[^`]+`), (https?:\/\/[^\s)]+), (<\/?[A-Z][^>]*>)

[*.mdx]
BasedOnStyles = write-good, proselint
proselint.Typography = NO
CommentDelimiters = {/*, */}
TokenIgnores = (`[^`]+`), (https?:\/\/[^\s)]+), (?sm)((?:import|export) .+?$), (?<!`)(<\w+ ?.+ ?\/>)(?!`), (<[A-Z]\w+>.+?<\/[A-Z]\w+>)
BlockIgnores = (?sm)^(<\w+\n .*\s\/>)$, (?sm)^({.+.*})
