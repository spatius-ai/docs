name: Documentation checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    name: Spell, grammar, and links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install check tools
        run: pnpm install --frozen-lockfile

      - name: Check spelling
        run: pnpm run check:spell

      - name: Check grammar and style
        run: pnpm run check:grammar

      - name: Check broken links
        run: pnpm run check:links
