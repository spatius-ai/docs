version: "0.2"
language: en
allowCompoundWords: false
useGitignore: true

ignorePaths:
  - ".git"
  - ".github"
  - ".vale"
  - "node_modules"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "docs.json"
  - "docs/**"
  - "custom.css"
  - "snippets/**"
  - "images/**"

ignoreRegExpList:
  - "/```[\\s\\S]*?```/g"
  - "/`[^`]+`/g"
  - "/https?:\\/\\/[^\\s)\\]>]+/g"
  - "/@[\\w.-]+\\/[\\w.-]+/g"

